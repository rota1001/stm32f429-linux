name: Buildroot

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build buildroot
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev rsync bc \
            cpio python3 unzip wget git file
          ./build.sh
